name: Build and publish Spark Edition APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "firebase-database-rules.json"
      - "firebase.json"
      - "functions/package.json"
      - "functions/test/rules.test.js"
      - ".github/workflows/android-release.yml"

concurrency:
  group: foodmobochain-spark-release
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  spark-rule-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Firebase test tools
        run: npm install --prefix functions --no-audit --no-fund
      - name: Test Realtime Database rules
        run: ./functions/node_modules/.bin/firebase emulators:exec --only database "npm --prefix functions test" --project demo-foodmobo

  build-and-release:
    needs: spark-rule-validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Configure Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Test and build Android app
        run: |
          chmod +x gradlew
          ./gradlew testDebugUnitTest assembleDebug --stacktrace

      - name: Prepare APK
        run: cp app/build/outputs/apk/debug/app-debug.apk FoodMoboChain-v1.1.0-Spark-debug.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: FoodMoboChain-v1.1.0-Spark-debug-apk
          path: FoodMoboChain-v1.1.0-Spark-debug.apk
          if-no-files-found: error

      - name: Publish GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > release-notes.md <<'EOF'
          FoodMoboChain v1.1.0 Spark Edition is a production-oriented MVP that runs without the Blaze plan.

          Included:
          - Firebase Authentication and email verification
          - Realtime Database with server-enforced Security Rules
          - App Check integration
          - Price-validated vendor-specific orders
          - Protected order status transitions and delivered-order reviews
          - Atomic per-day food-cart rental reservations
          - Verified-email administrator and vendor approval
          - Public HTTPS links instead of Blaze-only Firebase Storage uploads

          Before live testing, create the default Realtime Database in Firebase Console and deploy `firebase-database-rules.json`. This APK is debug-signed and intended for controlled pilots, testing and demonstration.
          EOF
          if gh release view v1.1.0-spark >/dev/null 2>&1; then
            gh release upload v1.1.0-spark FoodMoboChain-v1.1.0-Spark-debug.apk --clobber
            gh release edit v1.1.0-spark --notes-file release-notes.md
          else
            gh release create v1.1.0-spark FoodMoboChain-v1.1.0-Spark-debug.apk \
              --target "$GITHUB_SHA" \
              --title "FoodMoboChain v1.1.0 Spark Edition" \
              --notes-file release-notes.md \
              --prerelease
          fi

      - name: Mark Spark publication complete
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh issue view 3 >/dev/null 2>&1; then
            gh issue comment 3 --body "FoodMoboChain v1.1.0 Spark Edition was validated, built and published as \`FoodMoboChain-v1.1.0-Spark-debug.apk\` by workflow run ${GITHUB_RUN_ID}. The remaining live-backend step is creating the default Realtime Database once and running the Spark rules deployment workflow."
            gh issue close 3 --reason completed
          fi
