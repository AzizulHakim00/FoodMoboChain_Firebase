name: Build and publish Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Restore missing Gradle wrapper
        id: wrapper
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.13
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "created=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit restored wrapper
        if: steps.wrapper.outputs.created == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gradle/wrapper/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.properties gradlew gradlew.bat
          git commit -m "Restore Gradle wrapper"
          git push

      - name: Stop after wrapper restoration
        if: steps.wrapper.outputs.created == 'true'
        run: exit 0

      - name: Make Gradle wrapper executable
        if: steps.wrapper.outputs.created == 'false'
        run: chmod +x gradlew

      - name: Run unit tests
        if: steps.wrapper.outputs.created == 'false'
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Build installable debug APK
        if: steps.wrapper.outputs.created == 'false'
        run: ./gradlew assembleDebug --stacktrace

      - name: Prepare APK
        if: steps.wrapper.outputs.created == 'false'
        run: cp app/build/outputs/apk/debug/app-debug.apk FoodMoboChain-v1.0.0-debug.apk

      - name: Upload workflow artifact
        if: steps.wrapper.outputs.created == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: FoodMoboChain-debug-apk
          path: FoodMoboChain-v1.0.0-debug.apk
          if-no-files-found: error

      - name: Publish GitHub prerelease
        if: steps.wrapper.outputs.created == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v1.0.0 >/dev/null 2>&1; then
            gh release upload v1.0.0 FoodMoboChain-v1.0.0-debug.apk --clobber
          else
            gh release create v1.0.0 FoodMoboChain-v1.0.0-debug.apk \
              --target "$GITHUB_SHA" \
              --title "FoodMoboChain v1.0.0 Developer Preview" \
              --notes "Installable developer-preview APK built automatically from the main branch. This APK is debug-signed and intended for testing or academic demonstration." \
              --prerelease
          fi
