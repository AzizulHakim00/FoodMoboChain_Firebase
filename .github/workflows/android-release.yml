name: Build and publish FoodMoboChain v1.3

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "firebase-database-rules.json"
      - "firebase.json"
      - "functions/package.json"
      - "functions/test/*.test.js"
      - ".github/workflows/android-release.yml"

concurrency:
  group: foodmobochain-v1-3-release
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  spark-rule-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Firebase test tools
        run: npm install --prefix functions --no-audit --no-fund
      - name: Test Realtime Database rules
        run: ./functions/node_modules/.bin/firebase emulators:exec --only database "npm --prefix functions test" --project demo-foodmobo

  build-and-release:
    needs: spark-rule-validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Configure Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Test and build Android app
        run: |
          chmod +x gradlew
          ./gradlew testDebugUnitTest assembleDebug --stacktrace

      - name: Prepare APK
        run: cp app/build/outputs/apk/debug/app-debug.apk FoodMoboChain-v1.3.0-Large-Marketplace-debug.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: FoodMoboChain-v1.3.0-Large-Marketplace-debug-apk
          path: FoodMoboChain-v1.3.0-Large-Marketplace-debug.apk
          if-no-files-found: error

      - name: Publish GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > release-notes.md <<'EOF'
          FoodMoboChain v1.3.0 Large Marketplace substantially expands the Firebase Spark application into a multi-store food ecosystem.

          Included:
          - Store directory and store-specific menu pages
          - Repeatable large starter database with 12 stores and 72 foods
          - 22 categories, 8 campaigns, 10 delivery zones and 20 community posts
          - Professional public HTTPS food, store and rental-cart imagery
          - Official discounted checkout prices with regular-price comparison
          - Stock-aware catalogue, carts and Firebase Security Rules
          - Search by food, category, tags and store
          - Saved home, work and campus delivery addresses
          - Store-split cash-on-delivery checkout with delivery notes
          - Six-stage order flow: placed, accepted, preparing, packed, out for delivery and delivered
          - Support-ticket conversations with administrator replies
          - Admin and vendor marketplace analytics
          - Approved-vendor storefront creation and inventory management
          - 12 rental carts and 12 training resources
          - Firebase Authentication, App Check and server-enforced Realtime Database Security Rules

          The APK is debug-signed for direct installation and controlled real-user testing. Keep App Check enforcement disabled until its debug token is registered.
          EOF
          if gh release view v1.3.0-large-marketplace >/dev/null 2>&1; then
            gh release upload v1.3.0-large-marketplace FoodMoboChain-v1.3.0-Large-Marketplace-debug.apk --clobber
            gh release edit v1.3.0-large-marketplace --notes-file release-notes.md --target "$GITHUB_SHA"
          else
            gh release create v1.3.0-large-marketplace FoodMoboChain-v1.3.0-Large-Marketplace-debug.apk \
              --target "$GITHUB_SHA" \
              --title "FoodMoboChain v1.3.0 Large Marketplace" \
              --notes-file release-notes.md \
              --prerelease
          fi

      - name: Record publication
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "FoodMoboChain v1.3.0 published" \
            --body "The large marketplace APK was validated and published as \`FoodMoboChain-v1.3.0-Large-Marketplace-debug.apk\` by workflow run ${GITHUB_RUN_ID}." || true
