name: Build and publish FoodMoboChain v1.2

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "firebase-database-rules.json"
      - "firebase.json"
      - "functions/package.json"
      - "functions/test/rules.test.js"
      - ".github/workflows/android-release.yml"

concurrency:
  group: foodmobochain-v1-2-release
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  spark-rule-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Firebase test tools
        run: npm install --prefix functions --no-audit --no-fund
      - name: Test Realtime Database rules
        run: ./functions/node_modules/.bin/firebase emulators:exec --only database "npm --prefix functions test" --project demo-foodmobo

  build-and-release:
    needs: spark-rule-validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Configure Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Test and build Android app
        run: |
          chmod +x gradlew
          ./gradlew testDebugUnitTest assembleDebug --stacktrace

      - name: Prepare APK
        run: cp app/build/outputs/apk/debug/app-debug.apk FoodMoboChain-v1.2.0-Enterprise-debug.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: FoodMoboChain-v1.2.0-Enterprise-debug-apk
          path: FoodMoboChain-v1.2.0-Enterprise-debug.apk
          if-no-files-found: error

      - name: Publish GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > release-notes.md <<'EOF'
          FoodMoboChain v1.2.0 introduces a complete enterprise-style marketplace experience while remaining compatible with the Firebase Spark plan.

          Included:
          - Foodpanda-inspired marketplace home and discovery experience
          - Professional food photography loaded through cached public HTTPS media
          - Search, categories, sorting, favourites and vendor storefronts
          - Rich food-detail pages with preparation and delivery information
          - Protected cart and vendor-specific checkout
          - Live visual order tracking from placed through delivered
          - Unified order and announcement notifications
          - Vendor seller centre with menu images, logistics and availability
          - Administrator catalogue seeding, seller approval and moderation
          - Food-cart rentals, training, newsfeed, profiles and verified reviews
          - Firebase Authentication, App Check and server-enforced Realtime Database Security Rules

          The APK is debug-signed for direct installation and controlled real-user testing. Keep App Check enforcement disabled until its debug token is registered.
          EOF
          if gh release view v1.2.0-enterprise >/dev/null 2>&1; then
            gh release upload v1.2.0-enterprise FoodMoboChain-v1.2.0-Enterprise-debug.apk --clobber
            gh release edit v1.2.0-enterprise --notes-file release-notes.md --target "$GITHUB_SHA"
          else
            gh release create v1.2.0-enterprise FoodMoboChain-v1.2.0-Enterprise-debug.apk \
              --target "$GITHUB_SHA" \
              --title "FoodMoboChain v1.2.0 Enterprise Marketplace" \
              --notes-file release-notes.md \
              --prerelease
          fi

      - name: Record publication
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "FoodMoboChain v1.2.0 published" \
            --body "The enterprise marketplace APK was validated and published as \`FoodMoboChain-v1.2.0-Enterprise-debug.apk\` by workflow run ${GITHUB_RUN_ID}." || true
