name: Build and publish Android APK

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  backend-validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm test
      - name: Validate Realtime Database rules
        working-directory: .
        run: ./functions/node_modules/.bin/firebase emulators:exec --only database "npm --prefix functions run test:rules" --project demo-foodmobo

  build-and-release:
    needs: backend-validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Configure Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run unit tests
        id: tests
        continue-on-error: true
        run: |
          set -o pipefail
          ./gradlew testDebugUnitTest --stacktrace 2>&1 | tee test-output.log

      - name: Build installable debug APK
        id: build
        if: steps.tests.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build-output.log

      - name: Report build failure
        if: steps.tests.outcome == 'failure' || steps.build.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "The automated Android build failed for commit \`${GITHUB_SHA}\`."
            echo
            echo "## Unit-test output"
            echo '```text'
            tail -n 160 test-output.log 2>/dev/null || true
            echo '```'
            echo
            echo "## APK-build output"
            echo '```text'
            tail -n 200 build-output.log 2>/dev/null || true
            echo '```'
          } > build-failure.md
          gh issue create \
            --title "Android build failed: ${GITHUB_SHA::7}" \
            --body-file build-failure.md

      - name: Stop failed build
        if: steps.tests.outcome == 'failure' || steps.build.outcome == 'failure'
        run: exit 1

      - name: Prepare APK
        if: steps.tests.outcome == 'success' && steps.build.outcome == 'success'
        run: cp app/build/outputs/apk/debug/app-debug.apk FoodMoboChain-v1.1.0-debug.apk

      - name: Upload workflow artifact
        if: steps.tests.outcome == 'success' && steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: FoodMoboChain-v1.1.0-debug-apk
          path: FoodMoboChain-v1.1.0-debug.apk
          if-no-files-found: error

      - name: Publish GitHub prerelease
        if: steps.tests.outcome == 'success' && steps.build.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v1.1.0 >/dev/null 2>&1; then
            gh release upload v1.1.0 FoodMoboChain-v1.1.0-debug.apk --clobber
          else
            gh release create v1.1.0 FoodMoboChain-v1.1.0-debug.apk \
              --target "$GITHUB_SHA" \
              --title "FoodMoboChain v1.1.0 Security Preview" \
              --notes "Security-focused developer preview with trusted Firebase Functions operations, hardened rules and App Check integration. This APK is debug-signed and intended for testing or academic demonstration." \
              --prerelease
          fi
