name: Validate Android and Firebase backend

on:
  pull_request:
  push:
    branches:
      - agent/**

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm test
      - name: Validate Realtime Database rules
        working-directory: .
        run: ./functions/node_modules/.bin/firebase emulators:exec --only database "npm --prefix functions run test:rules" --project demo-foodmobo

  android-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-36" "build-tools;35.0.0"
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - run: ./gradlew testDebugUnitTest assembleDebug --stacktrace
