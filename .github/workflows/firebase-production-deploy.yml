name: Deploy Spark Realtime Database rules

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "firebase-database-rules.json"
      - ".github/workflows/firebase-production-deploy.yml"

permissions:
  contents: read
  issues: write

env:
  FIREBASE_PROJECT_ID: foodmobochainbd-c36f5

jobs:
  deploy-database-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Verify Firebase credential
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Repository secret FIREBASE_SERVICE_ACCOUNT_JSON is missing."
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"
          chmod 600 "$RUNNER_TEMP/firebase-service-account.json"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase test tools
        run: npm install --prefix functions --no-audit --no-fund

      - name: Validate Realtime Database rules
        run: ./functions/node_modules/.bin/firebase emulators:exec --only database "npm --prefix functions test" --project demo-foodmobo

      - name: Deploy Realtime Database rules
        id: deploy
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: |
          ./functions/node_modules/.bin/firebase deploy \
            --only database \
            --project "$FIREBASE_PROJECT_ID" \
            --non-interactive

      - name: Mark Spark backend active
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh issue view 8 >/dev/null 2>&1; then
            gh issue comment 8 --body "Spark Realtime Database rules were validated and deployed successfully by workflow run ${GITHUB_RUN_ID}."
            gh issue close 8 --reason completed
          fi

      - name: Report production rules failure
        if: failure() && steps.deploy.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Spark Realtime Database rules deployment failed" \
            --body "The rules passed emulator validation but production deployment failed. Review workflow run ${GITHUB_RUN_ID} for the exact Firebase error." || true
